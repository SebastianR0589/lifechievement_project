name: CICD

on:
  push:
    branches: [ main ]
  pull_request:

jobs:

  build-frontend:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' 
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd frontend
          npm ci # 'npm ci' ist schneller und sicherer in Pipelines als 'npm install'

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint
      
      - name: Run Frontend Tests
        run: |
          cd frontend
          npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true 

      - name: Build frontend
        run: |
          cd frontend
          npm run build


  build-backend:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Backend Checkstyle (Lint)
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw checkstyle:check

      - name: Make mvnw executable
        run: chmod +x mvnw
        working-directory: backend
      
      - name: Build backend
        run: ./mvnw clean package -e -X
        working-directory: backend


  docker-build:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    steps:
      - uses: actions/checkout@v4
      
      - name: Build docker images
        run: docker compose build